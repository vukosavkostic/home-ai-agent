name: Build APK
on: [push]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install build tools
        run: |
          sdkmanager "build-tools;34.0.0" "platforms;android-34"

      - name: Build APK manually
        run: |
          mkdir -p build/classes

          # Compile Java
          javac -source 8 -target 8 \
            -classpath $ANDROID_HOME/platforms/android-34/android.jar \
            -d build/classes \
            app/src/main/java/com/jarvis/tts/TtsPlayerService.java

          # Create DEX
          $ANDROID_HOME/build-tools/34.0.0/d8 \
            --output build/ \
            --lib $ANDROID_HOME/platforms/android-34/android.jar \
            build/classes/com/jarvis/tts/TtsPlayerService.class

          # Package
          $ANDROID_HOME/build-tools/34.0.0/aapt package -f \
            -M app/src/main/AndroidManifest.xml \
            -I $ANDROID_HOME/platforms/android-34/android.jar \
            -F build/jarvis-tts-unsigned.apk

          # Add DEX
          cd build && zip -j jarvis-tts-unsigned.apk classes.dex && cd ..

          # Generate debug keystore
          keytool -genkeypair -v \
            -keystore /tmp/debug.keystore \
            -alias android -keyalg RSA -keysize 2048 \
            -validity 10000 \
            -dname "CN=Android Debug,O=Android,C=US" \
            -storepass android -keypass android

          # Sign
          $ANDROID_HOME/build-tools/34.0.0/apksigner sign \
            --ks /tmp/debug.keystore \
            --ks-pass pass:android \
            --key-pass pass:android \
            --out build/jarvis-tts.apk \
            build/jarvis-tts-unsigned.apk

          echo "Build complete!"
          ls -la build/jarvis-tts.apk

      - uses: actions/upload-artifact@v4
        with:
          name: jarvis-tts-apk
          path: build/jarvis-tts.apk
